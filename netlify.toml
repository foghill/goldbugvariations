# Netlify config for The Gold Bug Variations site (SvelteKit rebuild).
# Build with @sveltejs/adapter-netlify; the whole site is prerendered to
# static HTML, so deploys behave like the old single-file static site.

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the immutable hashed app bundles.
[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never-cache the entry HTML so updates ship instantly.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/press-kit.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment; filename=\"The-Gold-Bug-Variations-Press-Kit.pdf\""

# Modest security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
